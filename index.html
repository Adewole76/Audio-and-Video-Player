<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>BangPlay</title>
</head>
<body>
    <nav>
        <h1 class="logo">BangPlay</h1>
    </nav>
    <section>
        <div class="file music-files">
            <header>
            <img class="div-hero" src="music.png" alt="">
            <p>play music from your local files</p>
        </header>
        </div>
        <div class="file video-files">
            <header>
          <img class="div-hero" src="video.png" alt="">
          <p>play videos from your local files</p>
        </header>
        </div>
    </section>
    <div class="animation-div">
        <h1 class="animation-h1">BangPlay</h1>
    </div>
</body>
</html>
